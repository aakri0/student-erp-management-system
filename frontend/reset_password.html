{% extends "base.html" %}
{% block content %}

<div class="auth-wrapper">
  <div class="card auth-card">
    <div class="text-center" style="margin-bottom: 2rem;">
      <h2 class="mb-2">Reset Password</h2>
      <p class="text-muted">
        Enter your new password below.
      </p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" placeholder="Enter new password" required autofocus>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm" placeholder="Re-enter password" required>
      </div>

      <div class="alert info" style="font-size: 0.9em; margin-top: 1rem;">
        Password must be at least 6 characters long.
      </div>

      <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
        Reset Password
      </button>
    </form>

    <div class="mt-4 text-center">
      <a href="/" style="font-weight: 600;">← Back to Login</a>
    </div>
  </div>
</div>

{% endblock %}
