{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h3 class="mb-0">Edit Faculty Information</h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group mb-3">
                            <label>Full Name</label>
                            <input type="text" name="name" class="form-control" value="{{ faculty.name }}" required>
                        </div>

                        <div class="form-group mb-3">
                            <label>Email Address</label>
                            <input type="email" name="email" class="form-control" value="{{ faculty.email }}" required>
                        </div>

                        <div class="form-group mb-4">
                            <label>Department</label>
                            <select name="dept_id" class="form-control" required>
                                {% for dept in departments %}
                                <option value="{{ dept.dept_id }}" {% if dept.dept_id==faculty.dept_id %}selected{%
                                    endif %}>
                                    {{ dept.dept_name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="d-flex justify-between">
                            <a href="{{ url_for('admin_manage_faculty') }}" class="btn btn-secondary"
                                style="width: auto; padding: 0.75rem 2rem;">Cancel</a>
                            <button type="submit" class="btn btn-primary"
                                style="width: auto; padding: 0.75rem 2rem;">Update Details</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
