{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h3 class="mb-0">Edit Department</h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group mb-4">
                            <label>Department Name</label>
                            <input type="text" name="dept_name" class="form-control" value="{{ department.dept_name }}"
                                required>
                        </div>

                        <div class="d-flex justify-between">
                            <a href="{{ url_for('admin_manage_departments') }}" class="btn btn-secondary"
                                style="width: auto; padding: 0.75rem 2rem;">Cancel</a>
                            <button type="submit" class="btn btn-primary"
                                style="width: auto; padding: 0.75rem 2rem;">Update</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
