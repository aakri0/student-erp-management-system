{% extends "base.html" %}
{% block content %}

<div class="auth-wrapper" style="align-items: flex-start; margin-top: 2rem;">
  <div class="card auth-card" style="max-width: 600px;">
    <div class="d-flex justify-between mb-4">
      <h2 style="margin-bottom: 0;">Create New User</h2>
      <a href="/admin_dashboard" class="btn btn-secondary" style="width: auto; padding: 0.5rem 1rem;">Back</a>
    </div>

    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="E.g. John Doe" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="E.g. john@college.edu" required>
      </div>

      <div class="form-group">
        <label>Role</label>
        <select name="role" id="roleSelect" onchange="toggleFields()" required>
          <option value="student">Student</option>
          <option value="faculty">Faculty</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <!-- Student Specific Fields -->
      <div id="studentFields">
        <div class="form-group">
          <label>Roll Number</label>
          <input type="text" name="roll_no" placeholder="E.g. 2023CS101">
        </div>
        <div class="form-group">
          <label>Year of Study</label>
          <select name="year_of_study">
            <option value="" disabled selected>Select Year</option>
            <option value="1">1st Year</option>
            <option value="2">2nd Year</option>
            <option value="3">3rd Year</option>
            <option value="4">4th Year</option>
          </select>
        </div>
      </div>

      <!-- Shared Dept Field (Student + Faculty) -->
      <div class="form-group" id="deptField">
        <label>Department ID</label>
        <input name="dept_id" type="number" min="1" placeholder="E.g. 101">
      </div>

      <div class="alert info mt-4">
        <div style="font-size: 0.9em;">
          <strong>Default Password:</strong> test123<br>
          <span style="opacity: 0.8;">User must reset password on first login.</span>
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Create User</button>
    </form>
  </div>
</div>

<script>
  function toggleFields() {
    const role = document.getElementById('roleSelect').value;
    const studentFields = document.getElementById('studentFields');
    const deptField = document.getElementById('deptField');

    // Get the input elements
    const rollNoInput = document.querySelector('input[name="roll_no"]');
    const yearInput = document.querySelector('select[name="year_of_study"]');
    const deptInput = document.querySelector('input[name="dept_id"]');

    if (role === 'student') {
      studentFields.style.display = 'block';
      deptField.style.display = 'block';
      // Make student fields required
      rollNoInput.required = true;
      yearInput.required = true;
      deptInput.required = true;
    } else if (role === 'faculty') {
      studentFields.style.display = 'none';
      deptField.style.display = 'block';
      // Remove required from student fields
      rollNoInput.required = false;
      yearInput.required = false;
      deptInput.required = true;
    } else {
      // Admin
      studentFields.style.display = 'none';
      deptField.style.display = 'none';
      // Remove required from all role-specific fields
      rollNoInput.required = false;
      yearInput.required = false;
      deptInput.required = false;
    }
  }

  // Run on load to set initial state
  document.addEventListener('DOMContentLoaded', toggleFields);
</script>

{% endblock %}
