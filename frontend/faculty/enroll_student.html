{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper" style="align-items: flex-start; margin-top: 2rem;">
  <div class="card auth-card">
    <div class="d-flex justify-between mb-4">
      <h2 style="margin-bottom: 0;">Enroll Student</h2>
      <a href="/faculty_dashboard" class="btn btn-secondary" style="width: auto; padding: 0.5rem 1rem;">Back</a>
    </div>

    <form method="POST">
      <div class="form-group">
        <label>Select Course</label>
        <select name="course_id" required>
          {% for c in courses %}
          <option value="{{ c.course_id }}">{{ c.course_name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Select Student</label>
        <select name="student_id" required>
          {% for s in students %}
          <option value="{{ s.student_id }}">{{ s.roll_no }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Semester</label>
        <input type="number" name="semester" placeholder="E.g. 5" min="1" max="8" required>
      </div>

      <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
        Enroll Student
      </button>
    </form>
  </div>
</div>
{% endblock %}
