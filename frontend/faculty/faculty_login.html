{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card">
        <h2 class="text-center mb-4">Faculty Login</h2>
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter faculty email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-primary">Login</button>

            <div class="resend mt-4 text-center">
                <span class="text-muted">Trouble logging in?</span>
                <a href="{{ url_for('forgot_password') }}">Reset password</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
