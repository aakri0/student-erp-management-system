{% extends "base.html" %}
{% block content %}

<div class="card">
  <div class="d-flex justify-between mb-4">
    <h2 class="card-title" style="margin-bottom: 0;">{{ course.course_name }}</h2>
    <a href="/faculty_dashboard" class="btn btn-secondary" style="width: auto;">&larr; Back</a>
  </div>

  <div style="overflow-x: auto;">
    <table>
      <thead>
        <tr>
          <th>Roll No</th>
          <th>Name</th>
          <th>Grade</th>
          <th style="width: 280px;">Action</th>
        </tr>
      </thead>
      <tbody>
        {% for s in students %}
        <tr>
          <td>{{ s.roll_no }}</td>
          <td>{{ s.name }}</td>
          <td>
            {% if s.grade %}
            <span class="badge completed" style="background-color: #DEF7EC; color: #03543F;">{{ s.grade }}</span>
            {% else %}
            <span class="text-muted">-</span>
            {% endif %}
          </td>
          <td>
            <form method="POST" style="display: flex; gap: 0.5rem; align-items: center;">
              <input type="hidden" name="enrollment_id" value="{{ s.enrollment_id }}">
              <input type="number" name="grade" placeholder="0-10" min="0" max="10" step="0.1" required
                style="width: 80px; padding: 0.5rem; text-align: center;">
              <button type="submit" class="btn"
                style="width: auto; padding: 0.5rem 1rem; font-size: 0.9rem;">Save</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr>
          <td colspan="4" class="text-center text-muted">No students enrolled.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
