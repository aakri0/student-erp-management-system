{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
  <div class="card auth-card text-center">
    <div style="margin-bottom: 2rem;">
      <h2 class="mb-2">OTP Verification</h2>
      <p class="text-muted">
        Please enter the 6-digit code sent to your email.<br>
        <span style="font-size: 0.9em; opacity: 0.8;">Valid for 5 minutes.</span>
      </p>
    </div>

    <form method="POST">
      <div class="form-group">
        <input type="text" name="otp" placeholder="0 0 0 0 0 0" required maxlength="6" autofocus
          style="text-align: center; letter-spacing: 0.5rem; font-size: 1.5rem; font-weight: 600; padding: 1rem;">
      </div>

      <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
        Verify Code
      </button>
    </form>

    <div class="mt-4">
      <span class="text-muted">Didn't receive code?</span>
      <a href="{{ url_for('resend_otp') }}" style="font-weight: 600; margin-left: 0.5rem;">Resend OTP</a>
    </div>
  </div>
</div>
{% endblock %}
