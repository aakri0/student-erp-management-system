{% extends "base.html" %}

{% block content %}
<div class="card">
  <h2>OTP Verification</h2>

  <p class="info-text">
    Please enter the 6-digit OTP sent to your registered email.
    <br>
    OTP is valid for 5 minutes.
  </p>

  <form method="POST">
    <input
      type="text"
      name="otp"
      placeholder="Enter OTP"
      required
      maxlength="6"
      autofocus
    >

    <button type="submit">
      Verify OTP
    </button>
  </form>

  <div class="resend">
    <a href="{{ url_for('resend_otp') }}">Resend OTP</a>
  </div>
</div>
{% endblock %}
