{% extends "base.html" %}
{% block content %}

<h2>Admin Analytics Dashboard</h2>

<form method="GET">
  <label>From:</label>
  <input type="date" name="start_date" value="{{ start_date }}">
  <label>To:</label>
  <input type="date" name="end_date" value="{{ end_date }}">
  <button type="submit">Apply</button>
  <a href="{{ url_for('admin_export_csv') }}">Export CSV</a>
</form>

<div class="card">Students: {{ total_students }}</div>
<div class="card">Faculty: {{ total_faculty }}</div>
<div class="card">Requests: {{ total_requests }}</div>

<canvas id="statusChart"></canvas>
<canvas id="categoryChart"></canvas>
<canvas id="deptChart"></canvas>

<script id="status-data" type="application/json">
  {{ status_data | tojson }}
</script>
<script id="category-data" type="application/json">
  {{ category_data | tojson }}
</script>
<script id="dept-data" type="application/json">
  {{ dept_data | tojson }}
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  function renderChart(id, labels, counts, type) {
    return new Chart(document.getElementById(id), {
      type: type,
      data: {
        labels: labels,
        datasets: [{ data: counts }]
      }
    });
  }

  const statusData = JSON.parse(document.getElementById('status-data').textContent);
  const categoryData = JSON.parse(document.getElementById('category-data').textContent);
  const deptData = JSON.parse(document.getElementById('dept-data').textContent);

  if (statusData.length)
    renderChart('statusChart', statusData.map(x=>x.status), statusData.map(x=>x.count), 'pie');

  if (categoryData.length)
    renderChart('categoryChart', categoryData.map(x=>x.category), categoryData.map(x=>x.count), 'bar');

  if (deptData.length)
    renderChart('deptChart', deptData.map(x=>x.dept_name), deptData.map(x=>x.count), 'bar');

  // 🔄 Auto-refresh every 30 seconds
  setInterval(() => location.reload(), 30000);
</script>

{% endblock %}
